services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      - VITE_API_BASE=http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - api
