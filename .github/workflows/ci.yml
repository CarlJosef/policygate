name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test engine
        run: cargo test --manifest-path engine/Cargo.toml
      - name: Build API
        run: cargo build --manifest-path api/Cargo.toml

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web
